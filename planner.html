<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homework Planner</title>

  <!-- PWA Manifest & Icons -->
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#111827">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Planner">
  <link rel="apple-touch-icon" href="./icon-512.png">

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });
    }
  </script>

  <style>
    :root {
      --bg: #020617;
      --card: #0f172a;
      --card-light: #111827;
      --accent: #4f46e5;
      --accent-soft: rgba(79, 70, 229, 0.15);
      --danger: #ef4444;
      --text-main: #e5e7eb;
      --text-soft: #9ca3af;
      --radius-lg: 18px;
      --radius-sm: 10px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1f2937 0, #020617 55%);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: stretch;
    }

    .app {
      width: 100%;
      max-width: 460px;
      padding: 16px 16px 24px;
    }

    .shell {
      background: rgba(15, 23, 42, 0.92);
      border-radius: 24px;
      border: 1px solid rgba(148, 163, 184, 0.2);
      box-shadow:
        0 18px 40px rgba(15, 23, 42, 0.8),
        0 0 0 1px rgba(15, 23, 42, 0.9);
      padding: 16px 14px 18px;
      backdrop-filter: blur(20px);
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .title-block {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .title-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .app-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: radial-gradient(circle at 30% 20%, #a5b4fc, #4f46e5);
      box-shadow: 0 0 8px rgba(129, 140, 248, 0.9);
    }

    h1 {
      font-size: 1rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-soft);
    }

    .subtitle {
      font-size: 0.75rem;
      color: var(--text-soft);
    }

    .pill {
      font-size: 0.7rem;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.4);
      background: radial-gradient(circle at top left, #1f2937, #020617);
      color: var(--text-soft);
    }

    .input-card {
      background: var(--card);
      border-radius: var(--radius-lg);
      padding: 12px 12px 10px;
      border: 1px solid rgba(148, 163, 184, 0.25);
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.6);
      margin-bottom: 12px;
    }

    .input-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-soft);
      margin-bottom: 6px;
    }

    .input-row {
      display: flex;
      gap: 8px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 11px;
      border-radius: var(--radius-sm);
      border: 1px solid rgba(148, 163, 184, 0.35);
      background: rgba(15, 23, 42, 0.9);
      color: var(--text-main);
      font-size: 0.9rem;
      outline: none;
    }

    .input-row input::placeholder {
      color: rgba(148, 163, 184, 0.85);
    }

    .input-row input:focus {
      border-color: rgba(129, 140, 248, 0.9);
      box-shadow: 0 0 0 1px rgba(129, 140, 248, 0.75);
    }

    .add-btn {
      padding: 0 12px;
      border-radius: var(--radius-sm);
      border: none;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: white;
      font-size: 0.85rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      white-space: nowrap;
      box-shadow: 0 6px 16px rgba(79, 70, 229, 0.5);
    }

    .add-btn:active {
      transform: translateY(1px);
      box-shadow: 0 3px 10px rgba(79, 70, 229, 0.4);
    }

    .meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      padding: 0 2px;
    }

    .meta-left {
      font-size: 0.75rem;
      color: var(--text-soft);
    }

    .meta-em {
      color: #c4b5fd;
      font-weight: 500;
    }

    .clear-btn {
      font-size: 0.7rem;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid rgba(248, 113, 113, 0.6);
      background: rgba(127, 29, 29, 0.4);
      color: #fecaca;
      cursor: pointer;
    }

    .list-card {
      background: var(--card-light);
      border-radius: var(--radius-lg);
      border: 1px solid rgba(75, 85, 99, 0.6);
      max-height: 60vh;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(55, 65, 81, 0.9) transparent;
    }

    .list-card::-webkit-scrollbar {
      width: 6px;
    }
    .list-card::-webkit-scrollbar-thumb {
      background: rgba(55, 65, 81, 0.9);
      border-radius: 999px;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 11px 12px;
      border-bottom: 1px solid rgba(55, 65, 81, 0.7);
    }

    li:last-child {
      border-bottom: none;
    }

    .task-main {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      box-shadow: 0 0 0 4px rgba(34, 197, 94, 0);
      transition: all 0.18s ease;
    }

    .status-dot.active {
      background: #22c55e;
      box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.2);
    }

    .status-dot.inactive {
      background: #6b7280;
    }

    .task-text {
      font-size: 0.88rem;
      line-height: 1.3;
      color: var(--text-main);
      word-break: break-word;
    }

    .task-text.completed {
      text-decoration: line-through;
      color: rgba(156, 163, 175, 0.85);
    }

    .task-controls {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
    }

    .task-controls label {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: var(--text-soft);
    }

    .task-controls input[type="checkbox"] {
      accent-color: #4ade80;
      width: 14px;
      height: 14px;
    }

    .delete-btn {
      border: none;
      padding: 4px 7px;
      border-radius: 8px;
      background: rgba(239, 68, 68, 0.12);
      color: #fecaca;
      cursor: pointer;
      font-size: 0.8rem;
    }

    .footer-hint {
      margin-top: 10px;
      text-align: center;
      font-size: 0.72rem;
      color: var(--text-soft);
    }

    @media (max-width: 480px) {
      .shell {
        border-radius: 20px;
        padding: 14px 12px 16px;
      }
      .input-row {
        flex-direction: column;
      }
      .add-btn {
        width: 100%;
        padding: 9px 0;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="shell">
      <header class="header">
        <div class="title-block">
          <div class="title-row">
            <div class="app-dot"></div>
            <h1>Homework planner</h1>
          </div>
          <span class="subtitle">Keep tonight’s assignments in one clean view.</span>
        </div>
        <div class="pill">PWA • offline ready</div>
      </header>

      <section class="input-card">
        <div class="input-label">New task</div>
        <div class="input-row">
          <input id="taskInput" placeholder="Ex: Math p.42 #2–12 (due Fri)" />
          <button class="add-btn" onclick="addTask()">Add</button>
        </div>
      </section>

      <div class="meta-row">
        <div class="meta-left">
          <span id="taskCount" class="meta-em">0</span> tasks • tap “Done” when finished.
        </div>
        <button class="clear-btn" onclick="clearCompleted()">Clear done</button>
      </div>

      <section class="list-card">
        <ul id="taskList"></ul>
      </section>

      <p class="footer-hint">Tip: Install to your home screen for a true app feel.</p>
    </div>
  </div>

  <script>
    let tasks = JSON.parse(localStorage.getItem('planner-tasks')) || [];
    const taskList = document.getElementById('taskList');
    const taskInput = document.getElementById('taskInput');
    const taskCount = document.getElementById('taskCount');

    function updateCount() {
      taskCount.textContent = tasks.length;
    }

    function renderTasks() {
      taskList.innerHTML = '';
      tasks.forEach((task, index) => {
        const li = document.createElement('li');
        li.innerHTML = `
          <div class="task-main">
            <span class="status-dot ${task.completed ? 'inactive' : 'active'}"></span>
            <span class="task-text ${task.completed ? 'completed' : ''}">${task.text}</span>
          </div>
          <div class="task-controls">
            <label>
              <input type="checkbox" ${task.completed ? 'checked' : ''} onchange="toggleTask(${index})">
              Done
            </label>
            <button class="delete-btn" onclick="deleteTask(${index})">✕</button>
          </div>
        `;
        taskList.appendChild(li);
      });
      localStorage.setItem('planner-tasks', JSON.stringify(tasks));
      updateCount();
    }

    function addTask() {
      const text = taskInput.value.trim();
      if (text) {
        tasks.unshift({ text, completed: false });
        taskInput.value = '';
        renderTasks();
      }
    }

    function toggleTask(index) {
      tasks[index].completed = !tasks[index].completed;
      renderTasks();
    }

    function deleteTask(index) {
      tasks.splice(index, 1);
      renderTasks();
    }

    function clearCompleted() {
      tasks = tasks.filter(task => !task.completed);
      renderTasks();
    }

    taskInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') addTask();
    });

    window.addEventListener('load', () => {
      taskInput.focus();
      renderTasks();
    });
  </script>
</body>
</html>
